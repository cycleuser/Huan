<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 740" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="fetcherGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#2b1055"/>
    </linearGradient>
    <linearGradient id="extractGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a8967"/>
      <stop offset="100%" stop-color="#065a45"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#999"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#222" font-size="24" font-weight="bold">Huan System Architecture</text>
  <line x1="220" y1="52" x2="740" y2="52" stroke="#ccc" stroke-width="1"/>

  <!-- CLI / Entry Layer -->
  <rect x="330" y="68" width="300" height="48" rx="8" fill="url(#headerGrad)" stroke="#4a6fa5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="98" text-anchor="middle" fill="#c8d6e5" font-size="16" font-weight="bold">CLI Entry (huan.core:main)</text>

  <!-- Arrow down -->
  <line x1="480" y1="116" x2="480" y2="142" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- SiteCrawler core box -->
  <rect x="60" y="142" width="840" height="550" rx="10" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="82" y="166" fill="#666" font-size="15" font-weight="bold">class SiteCrawler</text>

  <!-- URL Discovery -->
  <rect x="100" y="182" width="340" height="114" rx="8" fill="url(#coreGrad)" stroke="#2a5298" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="270" y="208" text-anchor="middle" fill="#8ab4f8" font-size="16" font-weight="bold">URL Discovery Module</text>
  <text x="270" y="232" text-anchor="middle" fill="#bbb" font-size="13">BFS traversal (deque)</text>
  <text x="270" y="252" text-anchor="middle" fill="#bbb" font-size="13">_normalize() / _is_internal()</text>
  <text x="270" y="272" text-anchor="middle" fill="#bbb" font-size="13">_extract_links() / _extract_json_urls()</text>
  <text x="270" y="292" text-anchor="middle" fill="#bbb" font-size="13">Incremental: _is_listing_page()</text>

  <!-- Fetcher Backends -->
  <rect x="520" y="182" width="340" height="114" rx="8" fill="url(#fetcherGrad)" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="690" y="208" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="bold">Pluggable Fetcher Layer</text>
  <text x="690" y="234" text-anchor="middle" fill="#bbb" font-size="13">RequestsFetcher (default)</text>
  <text x="690" y="254" text-anchor="middle" fill="#bbb" font-size="13">CurlCffiFetcher (TLS impersonate)</text>
  <text x="690" y="274" text-anchor="middle" fill="#bbb" font-size="13">DrissionPageFetcher (system browser)</text>
  <text x="690" y="294" text-anchor="middle" fill="#bbb" font-size="13">PlaywrightFetcher (headless Chromium)</text>

  <!-- Arrow: URL Discovery -> Fetcher -->
  <line x1="440" y1="240" x2="520" y2="240" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="480" y="232" text-anchor="middle" fill="#888" font-size="12">URL</text>

  <!-- Arrow down from Fetcher -->
  <line x1="690" y1="296" x2="690" y2="324" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="706" y="316" fill="#888" font-size="12">HTML</text>

  <!-- Content Extraction -->
  <rect x="100" y="324" width="760" height="100" rx="8" fill="url(#extractGrad)" stroke="#f87171" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="480" y="350" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Content Extraction &amp; Preprocessing</text>

  <!-- Three extraction modes side by side -->
  <rect x="120" y="362" width="175" height="48" rx="6" fill="#1a1a2e" stroke="#e94560" stroke-width="0.8"/>
  <text x="207" y="382" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">Readability Mode</text>
  <text x="207" y="400" text-anchor="middle" fill="#aaa" font-size="11">ReadabilityDocument</text>

  <rect x="315" y="362" width="175" height="48" rx="6" fill="#1a1a2e" stroke="#e94560" stroke-width="0.8"/>
  <text x="402" y="382" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">Heuristic Mode</text>
  <text x="402" y="400" text-anchor="middle" fill="#aaa" font-size="11">_heuristic_extract()</text>

  <rect x="510" y="362" width="175" height="48" rx="6" fill="#1a1a2e" stroke="#e94560" stroke-width="0.8"/>
  <text x="597" y="382" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">Full Mode</text>
  <text x="597" y="400" text-anchor="middle" fill="#aaa" font-size="11">No filtering</text>

  <!-- Preprocessing box -->
  <rect x="706" y="362" width="130" height="48" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="771" y="382" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="bold">Preprocess</text>
  <text x="771" y="400" text-anchor="middle" fill="#aaa" font-size="11">Math / Table / Code</text>

  <!-- Arrow down -->
  <line x1="480" y1="424" x2="480" y2="456" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Markdown Generation -->
  <rect x="170" y="456" width="370" height="90" rx="8" fill="url(#coreGrad)" stroke="#2a5298" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="355" y="482" text-anchor="middle" fill="#8ab4f8" font-size="16" font-weight="bold">Markdown Generation</text>
  <text x="355" y="504" text-anchor="middle" fill="#bbb" font-size="13">html2text conversion</text>
  <text x="355" y="522" text-anchor="middle" fill="#bbb" font-size="13">_html_to_markdown()</text>
  <text x="355" y="540" text-anchor="middle" fill="#bbb" font-size="13">YAML front matter + _extract_metadata()</text>

  <!-- Image Downloader -->
  <rect x="600" y="456" width="240" height="90" rx="8" fill="url(#coreGrad)" stroke="#2a5298" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="720" y="482" text-anchor="middle" fill="#8ab4f8" font-size="16" font-weight="bold">ImageDownloader</text>
  <text x="720" y="504" text-anchor="middle" fill="#bbb" font-size="13">extract_image_urls()</text>
  <text x="720" y="522" text-anchor="middle" fill="#bbb" font-size="13">download() + path rewrite</text>
  <text x="720" y="540" text-anchor="middle" fill="#bbb" font-size="13">compute_relative_path()</text>

  <!-- Arrow from MD gen to Image downloader -->
  <line x1="540" y1="500" x2="600" y2="500" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Arrow down to output -->
  <line x1="355" y1="546" x2="355" y2="578" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Output Layer -->
  <rect x="120" y="578" width="720" height="96" rx="8" fill="url(#outputGrad)" stroke="#34d399" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="480" y="604" text-anchor="middle" fill="#a7f3d0" font-size="16" font-weight="bold">Output (Filesystem)</text>

  <rect x="148" y="614" width="150" height="46" rx="6" fill="rgba(13,13,26,0.85)" stroke="#34d399" stroke-width="0.8"/>
  <text x="223" y="634" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">.md Files</text>
  <text x="223" y="652" text-anchor="middle" fill="#aaa" font-size="11">_url_to_filepath()</text>

  <rect x="320" y="614" width="150" height="46" rx="6" fill="rgba(13,13,26,0.85)" stroke="#34d399" stroke-width="0.8"/>
  <text x="395" y="634" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">images/</text>
  <text x="395" y="652" text-anchor="middle" fill="#aaa" font-size="11">Local + _external/</text>

  <rect x="492" y="614" width="150" height="46" rx="6" fill="rgba(13,13,26,0.85)" stroke="#34d399" stroke-width="0.8"/>
  <text x="567" y="634" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">.html (optional)</text>
  <text x="567" y="652" text-anchor="middle" fill="#aaa" font-size="11">--save-html</text>

  <rect x="664" y="614" width="150" height="46" rx="6" fill="rgba(13,13,26,0.85)" stroke="#34d399" stroke-width="0.8"/>
  <text x="739" y="634" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">YAML meta</text>
  <text x="739" y="652" text-anchor="middle" fill="#aaa" font-size="11">Front matter</text>

  <!-- Loop arrow from output back to URL Discovery -->
  <path d="M100,640 L68,640 L68,240 L100,240" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <text x="50" y="440" fill="#888" font-size="12" text-anchor="middle" transform="rotate(-90, 50, 440)">BFS loop: new links enqueued</text>

  <!-- Footer -->
  <text x="480" y="725" text-anchor="middle" fill="#999" font-size="12">Huan  |  huan/core.py  |  All classes and methods correspond to actual codebase</text>
</svg>
